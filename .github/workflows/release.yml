name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  VERSION: ${{ github.ref_name }}

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: pnpm-${{ runner.os }}-${{ hashFiles('frontend/pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install frontend dependencies
        run: cd frontend && pnpm install

      - name: Build macOS (universal)
        run: |
          echo $VERSION > internal/constants/version.txt
          wails build -platform darwin/universal
          cd build/bin
          ditto -c -k --sequesterRsrc --keepParent railyard.app railyard-${VERSION}-macos-universal.zip

      - name: Create DMG
        run: |
          hdiutil create -volname "Railyard" -srcfolder build/bin/railyard.app -ov -format UDZO build/bin/railyard-${VERSION}-macos-universal.dmg

      - uses: actions/upload-artifact@v4
        with:
          name: macos-artifacts
          path: |
            build/bin/railyard-${{ env.VERSION }}-macos-universal.dmg
            build/bin/railyard-${{ env.VERSION }}-macos-universal.zip

  build-linux:
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        type: ["legacy", "current"]
    env:
      TYPE: ${{matrix.type}}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: pnpm-${{ runner.os }}-${{ hashFiles('frontend/pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-

      - name: Install Linux dependencies (Legacy)
        if: ${{matrix.type == 'legacy'}}
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev
      - name: Install Linux dependencies (Current)
        if: ${{matrix.type == 'current'}}
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install frontend dependencies
        run: cd frontend && pnpm install

      - name: Build Linux (amd64 current)
        if: ${{matrix.type == 'current'}}
        run: |
          echo $VERSION > internal/constants/version.txt
          wails build -platform linux/amd64 -tags webkit2_41
          
      - name: Build Linux (amd64 legacy)
        if: ${{matrix.type == 'legacy'}}
        run: |
          echo $VERSION > internal/constants/version.txt
          wails build -platform linux/amd64

      - name: Create AppImage
        run: |
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage

          mkdir -p AppDir/usr/bin AppDir/usr/share/icons/hicolor/512x512/apps AppDir/usr/share/applications
          cp build/bin/railyard AppDir/usr/bin/railyard
          cp build/appicon.png AppDir/usr/share/icons/hicolor/512x512/apps/railyard.png

          cat > AppDir/usr/share/applications/railyard.desktop << 'EOF'
          [Desktop Entry]
          Name=Railyard
          Exec=railyard
          Icon=railyard
          Type=Application
          Categories=Utility;Game;
          EOF

          ./linuxdeploy-x86_64.AppImage --appdir AppDir --output appimage
          mv Railyard-*.AppImage build/bin/railyard-${VERSION}-${TYPE}-linux-amd64.AppImage

      - uses: actions/upload-artifact@v4
        with:
          name: linux-artifacts
          path: build/bin/railyard-${{ env.VERSION }}-${{ matrix.type }}-linux-amd64.AppImage

  build-windows:
    runs-on: windows-latest
    strategy:
      matrix:
        arch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/AppData/Local/pnpm/store
          key: pnpm-${{ runner.os }}-${{ hashFiles('frontend/pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-

      - name: Install NSIS
        run: |
          choco install nsis -y
          echo "C:\Program Files (x86)\NSIS" >> $env:GITHUB_PATH

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install frontend dependencies
        run: cd frontend && pnpm install

      - name: Build Windows (${{ matrix.arch }}) with NSIS installer
        run: |
          echo $VERSION > internal/constants/version.txt
          wails build -platform windows/${{ matrix.arch }} -nsis

      - name: Rename artifacts
        run: |
          Move-Item build\bin\railyard-${{ matrix.arch }}-installer.exe build\bin\railyard-${{ env.VERSION }}-windows-${{ matrix.arch }}-installer.exe
          Compress-Archive -Path build\bin\railyard.exe -DestinationPath build\bin\railyard-${{ env.VERSION }}-windows-${{ matrix.arch }}-portable.zip

      - uses: actions/upload-artifact@v4
        with:
          name: windows-${{ matrix.arch }}-artifacts
          path: |
            build/bin/railyard-${{ env.VERSION }}-windows-${{ matrix.arch }}-installer.exe
            build/bin/railyard-${{ env.VERSION }}-windows-${{ matrix.arch }}-portable.zip

  release:
    needs: [build-macos, build-linux, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            railyard-${{ env.VERSION }}-macos-universal.dmg
            railyard-${{ env.VERSION }}-macos-universal.zip
            railyard-${{ env.VERSION }}-linux-amd64.AppImage
            railyard-${{ env.VERSION }}-windows-amd64-installer.exe
            railyard-${{ env.VERSION }}-windows-amd64-portable.zip
            railyard-${{ env.VERSION }}-windows-arm64-installer.exe
            railyard-${{ env.VERSION }}-windows-arm64-portable.zip
