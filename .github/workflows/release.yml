name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install frontend dependencies
        run: cd frontend && pnpm install

      - name: Build macOS (universal)
        run: |
          wails build -platform darwin/universal
          cd build/bin
          ditto -c -k --sequesterRsrc --keepParent railyard.app railyard-macos-universal.zip

      - name: Create DMG
        run: |
          hdiutil create -volname "Railyard" -srcfolder build/bin/railyard.app -ov -format UDZO build/bin/railyard-macos-universal.dmg

      - uses: actions/upload-artifact@v4
        with:
          name: macos-artifacts
          path: |
            build/bin/railyard-macos-universal.dmg
            build/bin/railyard-macos-universal.zip

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install frontend dependencies
        run: cd frontend && pnpm install

      - name: Build Linux (amd64)
        run: wails build -platform linux/amd64

      - name: Create AppImage
        run: |
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage

          mkdir -p AppDir/usr/bin AppDir/usr/share/icons/hicolor/512x512/apps AppDir/usr/share/applications
          cp build/bin/railyard AppDir/usr/bin/railyard
          cp build/appicon.png AppDir/usr/share/icons/hicolor/512x512/apps/railyard.png

          cat > AppDir/usr/share/applications/railyard.desktop << 'EOF'
          [Desktop Entry]
          Name=Railyard
          Exec=railyard
          Icon=railyard
          Type=Application
          Categories=Utility;Game;
          EOF

          ./linuxdeploy-x86_64.AppImage --appdir AppDir --output appimage
          mv Railyard-*.AppImage build/bin/railyard-linux-amd64.AppImage

      - uses: actions/upload-artifact@v4
        with:
          name: linux-artifacts
          path: build/bin/railyard-linux-amd64.AppImage

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install frontend dependencies
        run: cd frontend && pnpm install

      - name: Build Windows (amd64) with NSIS installer
        run: wails build -platform windows/amd64 -nsis

      - name: Rename installer
        run: |
          Move-Item build\bin\railyard-amd64-installer.exe build\bin\railyard-windows-amd64-installer.exe

      - uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: build/bin/railyard-windows-amd64-installer.exe

  release:
    needs: [build-macos, build-linux, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            railyard-macos-universal.dmg
            railyard-macos-universal.zip
            railyard-linux-amd64.AppImage
            railyard-windows-amd64-installer.exe
